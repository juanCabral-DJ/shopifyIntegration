apiVersion: v1
kind: Secret
metadata:
  name: shopify-redis-secret
type: Opaque
stringData:
  REDIS_PASSWORD: R3dis_7qq3pL2vN8xY_2026
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shopify-redis-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopify-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopify-redis
  template:
    metadata:
      labels:
        app: shopify-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopify-redis-secret
                  key: REDIS_PASSWORD
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: shopify-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: shopify-redis
spec:
  type: ClusterIP
  selector:
    app: shopify-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
